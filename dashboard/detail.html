<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流水明细</title>
    <link rel="stylesheet" href="./detail.css" />
  </head>
  <body>
    <div class="detail-shell">
      <header class="detail-hero">
        <div>
          <a class="back-link" href="./">返回看板</a>
          <h1>流水明细</h1>
        </div>
        <div class="hero-summary">
          <div class="summary-card expense">
            <span>本月支出</span>
            <strong id="month-expense">-</strong>
          </div>
          <div class="summary-card income">
            <span>本月收入</span>
            <strong id="month-income">-</strong>
          </div>
        </div>
      </header>

      <section class="toolbar panel">
        <div>
          <p class="toolbar-label">年份</p>
          <div class="segmented-wrap" id="year-tabs"></div>
        </div>
        <div>
          <p class="toolbar-label">月份</p>
          <div class="segmented-wrap" id="month-tabs"></div>
        </div>
      </section>

      <main id="month-feed" class="month-feed"></main>
    </div>

    <button id="add-entry-btn" class="fab" type="button">+ 记一笔</button>

    <div id="entry-modal" class="modal hidden">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-card">
        <div class="modal-header">
          <div class="type-tabs" role="tablist" aria-label="收支类型">
            <button type="button" class="type-tab active" data-io-type="支出">支出</button>
            <button type="button" class="type-tab" data-io-type="收入">收入</button>
          </div>
          <button type="button" class="text-btn" data-close="1">取消</button>
        </div>
        <form id="entry-form" class="entry-form">
          <input name="io_type" type="hidden" value="支出" required />
          <input name="amount" type="hidden" required />
          <div class="entry-field">
            <div class="field-head">
              <span>一级分类</span>
              <button type="button" id="category-toggle" class="inline-toggle">展开</button>
            </div>
            <div id="selected-category" class="selected-category hidden"></div>
            <div id="category-picker" class="category-picker"></div>
            <input name="category" type="hidden" required />
          </div>
          <div class="entry-field">
            <div class="field-head">
              <span>二级分类</span>
              <small>按已选一级分类推荐</small>
            </div>
            <div id="subcategory-picker" class="subcategory-picker"></div>
            <input name="subcategory" list="subcategory-options" placeholder="没有合适的就手动填写" />
          </div>
          <datalist id="subcategory-options"></datalist>

          <div class="quick-entry-dock">
            <div class="amount-row">
              <button type="button" id="delete-entry-btn" class="danger-btn hidden">删除</button>
              <output id="amount-display" class="amount-display">0.00</output>
            </div>
            <label class="memo-field">
              <span>备注：</span>
              <input name="memo" placeholder="点击填写备注" />
            </label>
            <div class="keypad" aria-label="金额键盘">
              <button type="button" class="keypad-key" data-key="7">7</button>
              <button type="button" class="keypad-key" data-key="8">8</button>
              <button type="button" class="keypad-key" data-key="9">9</button>
              <label class="keypad-key meta-key date-key">
                <span id="date-shortcut">今天</span>
                <input name="occurred_on" type="date" required class="native-date-input" aria-label="记账日期" />
              </label>
              <button type="button" class="keypad-key" data-key="4">4</button>
              <button type="button" class="keypad-key" data-key="5">5</button>
              <button type="button" class="keypad-key" data-key="6">6</button>
              <button type="button" class="keypad-key" data-op="+">+</button>
              <button type="button" class="keypad-key" data-key="1">1</button>
              <button type="button" class="keypad-key" data-key="2">2</button>
              <button type="button" class="keypad-key" data-key="3">3</button>
              <button type="button" class="keypad-key" data-op="-">-</button>
              <button type="button" class="keypad-key" data-key=".">.</button>
              <button type="button" class="keypad-key" data-key="0">0</button>
              <button type="button" class="keypad-key" data-backspace aria-label="退格">⌫</button>
              <button type="button" id="amount-action" class="keypad-key done-key">完成</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="./detail.js"></script>
  </body>
</html>
